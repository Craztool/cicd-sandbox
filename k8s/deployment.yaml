apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-app
  template:
    metadata:
      labels:
        app: sandbox-app
    spec:
      containers:
      - name: web-server
        image: ghcr.io/craztool/cicd-sandbox:d4375f5b0052a9f342ae9771acbfd639a01ca1e1
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
