name: CI

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/chekout@v4
      - name: Установить  flake8
        run: pip install flake8
      - name: Проверить код линтером
        run: flake8 app.py --max-line-lengrg=100

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/chekout@v4
      - name: Установить pytest
        run: pip install pytest
      - name: Запустить тесты
        run: pytest

  build:
    runs-on: ubuntu-latest
    needs: [lint,test]
    steps:
      - uses: actions/chekout@v4
      - name: Собрать Docker-образ
      - run docker build -t myapp:${{ github.sha }} .
    